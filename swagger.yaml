openapi: 3.0.3
info:
  title: Whispers Chat Backend
  version: 2.0.0
  description: |
    Chat backend secured with OIDC Authorization Code Flow with PKCE and bearer-token authorization.

    HTTP base URL example: `http://localhost:8080`
    WebSocket URL example: `ws://localhost:8080/ws/user`

    Protected HTTP endpoints require `Authorization: Bearer <access_token>`.
    Refresh uses an `HttpOnly` cookie issued by the backend on login and rotation.

    Browser WebSocket clients cannot reliably send `Authorization` headers, so the
    WebSocket handshake may authenticate either with:
    - `Authorization: Bearer <access_token>`
    - `Sec-WebSocket-Protocol: whispers.bearer.<access_token>`

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

paths:
  /auth/{provider}/login:
    post:
      summary: Exchange provider authorization code for Whispers access token
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          example: google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginRequest'
      responses:
        '200':
          description: Authenticated successfully; backend also sets `whispers_refresh_token` as an HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/refresh:
    post:
      summary: Rotate refresh token cookie and issue a new access token
      security: []
      responses:
        '200':
          description: Refreshed successfully; backend also rotates the `whispers_refresh_token` HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Revoke the current access token and refresh cookie session
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - redirectUri
                properties:
                  status:
                    type: string
                    example: logged_out
                  redirectUri:
                    type: string
                    example: http://localhost:5173/
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ws/user:
    get:
      summary: Upgrade an authenticated connection to WebSocket
      description: |
        Connects the authenticated user to the backend over WebSocket.

        The handshake requires a Whispers bearer token, supplied either by:
        - `Authorization: Bearer <access_token>`
        - `Sec-WebSocket-Protocol: whispers.bearer.<access_token>`

        After successful upgrade, the server sends a text frame:
        `CONNECTED:{username}`

        Client text frames may send:
        - chat message JSON: `{"type":"MESSAGE","chatId":123,"text":"hello there"}`
        - presence ping JSON: `{"type":"PRESENCE"}`
        - typing started JSON: `{"type":"TYPING_START","chatId":123}`
        - typing stopped JSON: `{"type":"TYPING_END","chatId":123}`

        Server text frames may send:
        - `MessageRecord` as JSON
        - `PresenceEvent` as JSON
        - `TypingEvent` as JSON
        - plain text errors starting with `ERROR:`
      responses:
        '101':
          description: Switching Protocols, upgraded to WebSocket
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /chats:
    get:
      summary: Get chats for the authenticated user
      responses:
        '200':
          description: List of chats for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a chat with another connected user
      parameters:
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          example: bob@example.com
      responses:
        '200':
          description: Chat created or returned if it already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /messages:
    get:
      summary: Get message history for a chat
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 123
      responses:
        '200':
          description: List of messages in the chat
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      summary: Get interlocutors with last known ping timestamps
      responses:
        '200':
          description: Users who have chats with the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      summary: Get user profile data available for the specified user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
      responses:
        '200':
          description: User profile resolved from local user data and linked external identity when available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque access token

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, revoked, or expired bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OAuthLoginRequest:
      type: object
      required:
        - code
        - redirectUri
        - codeVerifier
        - nonce
      properties:
        code:
          type: string
          description: OAuth authorization code issued by the selected provider
        redirectUri:
          type: string
          description: Redirect URI used in the OAuth flow
          example: http://localhost:5173/auth/callback/google
        codeVerifier:
          type: string
          description: PKCE code verifier used in the authorization request
        nonce:
          type: string
          description: Nonce sent in the OIDC authorization request and validated against the ID token

    LoginResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
        - user
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int64
          example: 86400
        user:
          $ref: '#/components/schemas/AuthUserProfile'

    AuthUserProfile:
      type: object
      required:
        - userId
        - username
        - email
      properties:
        userId:
          type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
        username:
          type: string
          example: alice@example.com
        email:
          type: string
          example: alice@example.com
        displayName:
          type: string
          example: alice@example.com
        firstName:
          type: string
          example: Alice
        lastName:
          type: string
          example: Example
        pictureUrl:
          type: string
          format: uri
        provider:
          type: string
          nullable: true
          example: google

    ChatSummary:
      type: object
      required:
        - chatId
        - username
        - type
      properties:
        chatId:
          type: integer
          format: int64
          example: 123
        username:
          type: string
          example: bob@example.com
        type:
          $ref: '#/components/schemas/ChatType'

    ChatType:
      type: string
      enum: [DIRECT, GROUP]
      example: DIRECT

    WebSocketCommand:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/WebSocketCommandType'
        chatId:
          type: integer
          format: int64
          nullable: true
          example: 123
        text:
          type: string
          nullable: true
          example: hello there

    WebSocketCommandType:
      type: string
      enum: [PRESENCE, MESSAGE, TYPING_START, TYPING_END]
      example: MESSAGE

    MessageRecord:
      type: object
      required:
        - chatId
        - senderUserId
        - text
        - timestamp
      properties:
        chatId:
          type: integer
          format: int64
          example: 123
        senderUserId:
          type: string
          example: alice@example.com
        text:
          type: string
          example: hello there
        timestamp:
          type: string
          description: Server-side message timestamp
          example: '2026-04-10T12:34:56Z'

    User:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          example: bob@example.com
        firstName:
          type: string
          example: Bob
        lastName:
          type: string
          example: Example
        lastPingTime:
          type: string
          example: '2026-04-10T12:34:56'

    UserProfile:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
        username:
          type: string
          example: alice@example.com
        firstName:
          type: string
          nullable: true
          example: Alice
        lastName:
          type: string
          nullable: true
          example: Example
        profileUrl:
          type: string
          nullable: true
          format: uri
          example: https://lh3.googleusercontent.com/a/example
        provider:
          type: string
          nullable: true
          example: google

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid or expired bearer token
