openapi: 3.0.3
info:
  title: Whispers Chat Backend
  version: 2.0.0
  description: |
    Chat backend secured with OIDC Authorization Code Flow with PKCE and bearer-token authorization.

    HTTP base URL example: `http://localhost:8080`
    WebSocket URL example: `ws://localhost:8080/ws/user`

    Protected HTTP endpoints require `Authorization: Bearer <access_token>`.
    Refresh uses an `HttpOnly` cookie issued by the backend on login and rotation.

    Browser WebSocket clients cannot reliably send `Authorization` headers, so the
    WebSocket handshake may authenticate either with:
    - `Authorization: Bearer <access_token>`
    - `Sec-WebSocket-Protocol: whispers.bearer.<access_token>`

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

paths:
  /auth/{provider}/login:
    post:
      summary: Exchange provider authorization code for Whispers access token
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          example: google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginRequest'
      responses:
        '200':
          description: Authenticated successfully; backend also sets `whispers_refresh_token` as an HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      summary: Rotate refresh token cookie and issue a new access token
      security: []
      responses:
        '200':
          description: Refreshed successfully; backend also rotates the `whispers_refresh_token` HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      summary: Revoke the current access token and refresh cookie session
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - redirectUri
                properties:
                  status:
                    type: string
                    example: logged_out
                  redirectUri:
                    type: string
                    example: http://localhost:5173/
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ws/user:
    get:
      summary: Upgrade an authenticated connection to WebSocket
      description: |
        Connects the authenticated user to the backend over WebSocket.

        The handshake requires a Whispers bearer token, supplied either by:
        - `Authorization: Bearer <access_token>`
        - `Sec-WebSocket-Protocol: whispers.bearer.<access_token>`

        After successful upgrade, the server sends a text frame:
        `CONNECTED:{username}`

        Client text frames may send:
        - chat message JSON: `{"type":"MESSAGE","chatId":123,"text":"hello there"}`
        - private chat message JSON: `{"type":"PRIVATE_MESSAGE","chatId":456,"privateMessage":{"protocolVersion":"v1","encryptionAlgorithm":"AES-GCM","keyWrapAlgorithm":"RSA-OAEP","ciphertext":"...","nonce":"...","senderKeyId":"alice-browser-key","senderMessageKeyEnvelope":"...","recipientKeyId":"bob-browser-key","recipientMessageKeyEnvelope":"..."}}`
        - presence ping JSON: `{"type":"PRESENCE"}`
        - typing started JSON: `{"type":"TYPING_START","chatId":123}`
        - typing stopped JSON: `{"type":"TYPING_END","chatId":123}`

        Server text frames may send:
        - `MessageRecord` as JSON
        - `MessageDeleteEvent` as JSON after a successful HTTP message deletion
        - `PrivateMessageView` as JSON
        - `PresenceEvent` as JSON
        - `TypingEvent` as JSON
        - plain text errors starting with `ERROR:`; unexpected internal failures are normalized to `ERROR: Internal server error`
      responses:
        '101':
          description: Switching Protocols, upgraded to WebSocket
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats:
    get:
      summary: Get chats for the authenticated user
      description: |
        `DIRECT` chats are always returned.
        `PRIVATE` chats are returned only when the optional browser `keyId` matches the browser key bound to that chat for the authenticated user.
      parameters:
        - name: keyId
          in: query
          required: false
          schema:
            type: string
          example: alice-browser-key
      responses:
        '200':
          description: List of chats for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a DIRECT chat with another user
      parameters:
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          example: bob@example.com
      responses:
        '200':
          description: Chat created or returned if it already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /public-keys:
    post:
      summary: Register or update the current browser public key for PRIVATE chats
      description: |
        The authenticated user is resolved from the bearer token on the request.
        The request body must contain only the browser public-key registration data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPrivateChatKeyRequest'
      responses:
        '200':
          description: Current browser key stored as the user's active PRIVATE key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateChatKeyView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /private-chats:
    post:
      summary: Create a PRIVATE browser-tied chat with another user
      description: |
        Creates a new `PRIVATE` chat for the authenticated user's browser `keyId` and the counterpart browser key.
        If a `PRIVATE` chat already exists for the same user pair and the same browser-key pair, that chat is returned.
      parameters:
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          example: bob@example.com
        - name: keyId
          in: query
          required: true
          schema:
            type: string
          example: alice-browser-key
      responses:
        '200':
          description: PRIVATE chat created or returned if the same browser-key-bound chat already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /private-chats/{chatId}:
    get:
      summary: Get PRIVATE chat metadata and browser-bound key material references
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 456
        - name: keyId
          in: query
          required: true
          schema:
            type: string
          example: alice-browser-key
      responses:
        '200':
          description: PRIVATE chat metadata for the browser key bound to that chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateChatView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /private-chats/{chatId}/messages:
    get:
      summary: Get encrypted message history for a PRIVATE chat bound to a specific browser key
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 456
        - name: keyId
          in: query
          required: true
          schema:
            type: string
          example: alice-browser-key
      responses:
        '200':
          description: Stored encrypted messages for the PRIVATE chat
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrivateMessageView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /messages:
    get:
      summary: Get plaintext message history for a DIRECT chat
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 123
      responses:
        '200':
          description: List of messages in the chat
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /messages/{messageId}:
    delete:
      summary: Delete a plaintext DIRECT chat message owned by the authenticated user
      description: Successful deletion also emits a `MessageDeleteEvent` WebSocket frame to both DIRECT chat participants.
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 987
      responses:
        '200':
          description: Message deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users:
    get:
      summary: Get interlocutors with last known ping timestamps
      responses:
        '200':
          description: Users who have chats with the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{userId}:
    get:
      summary: Get user profile data available for the specified user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
      responses:
        '200':
          description: User profile resolved from local user data and linked external identity when available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque access token

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, revoked, or expired bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server-side failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OAuthLoginRequest:
      type: object
      required:
        - code
        - redirectUri
        - codeVerifier
        - nonce
      properties:
        code:
          type: string
          description: OAuth authorization code issued by the selected provider
        redirectUri:
          type: string
          description: Redirect URI used in the OAuth flow
          example: http://localhost:5173/auth/callback/google
        codeVerifier:
          type: string
          description: PKCE code verifier used in the authorization request
        nonce:
          type: string
          description: Nonce sent in the OIDC authorization request and validated against the ID token

    LoginResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
        - user
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int64
          example: 86400
        user:
          $ref: '#/components/schemas/AuthUserProfile'

    AuthUserProfile:
      type: object
      required:
        - userId
        - username
        - email
      properties:
        userId:
          type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
        username:
          type: string
          example: alice@example.com
        email:
          type: string
          example: alice@example.com
        displayName:
          type: string
          example: alice@example.com
        firstName:
          type: string
          example: Alice
        lastName:
          type: string
          example: Example
        pictureUrl:
          type: string
          format: uri
        provider:
          type: string
          nullable: true
          example: google

    ChatSummary:
      type: object
      required:
        - chatId
        - username
        - type
      properties:
        chatId:
          type: integer
          format: int64
          example: 123
        username:
          type: string
          example: bob@example.com
        type:
          $ref: '#/components/schemas/ChatType'

    ChatType:
      type: string
      enum: [DIRECT, PRIVATE]
      example: DIRECT

    WebSocketCommand:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/WebSocketCommandType'
        chatId:
          type: integer
          format: int64
          nullable: true
          example: 123
        text:
          type: string
          nullable: true
          example: hello there
        privateMessage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EncryptedPrivateMessagePayload'

    WebSocketCommandType:
      type: string
      enum: [PRESENCE, MESSAGE, PRIVATE_MESSAGE, TYPING_START, TYPING_END]
      example: MESSAGE

    RegisterPrivateChatKeyRequest:
      type: object
      required:
        - keyId
        - publicKey
        - algorithm
        - format
      properties:
        keyId:
          type: string
          description: Client-generated browser/device key identifier
          example: alice-browser-key
        publicKey:
          type: string
          description: Public key material encoded by the frontend, typically base64 SPKI
          example: MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8A...
        algorithm:
          type: string
          example: RSA-OAEP
        format:
          type: string
          example: spki

    PrivateChatKeyStatus:
      type: string
      enum: [ACTIVE, REVOKED]
      example: ACTIVE

    PrivateChatKeyView:
      type: object
      required:
        - keyId
        - publicKey
        - algorithm
        - format
        - status
        - createdAt
        - updatedAt
      properties:
        keyId:
          type: string
          example: alice-browser-key
        publicKey:
          type: string
          example: MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8A...
        algorithm:
          type: string
          example: RSA-OAEP
        format:
          type: string
          example: spki
        status:
          $ref: '#/components/schemas/PrivateChatKeyStatus'
        createdAt:
          type: string
          example: '2026-04-20T12:00:00Z'
        updatedAt:
          type: string
          example: '2026-04-20T12:01:00Z'

    PrivateChatView:
      type: object
      required:
        - chatId
        - username
        - type
        - currentUserKey
        - counterpartKey
      properties:
        chatId:
          type: integer
          format: int64
          example: 456
        username:
          type: string
          example: bob@example.com
        type:
          $ref: '#/components/schemas/ChatType'
        currentUserKey:
          $ref: '#/components/schemas/PrivateChatKeyView'
        counterpartKey:
          $ref: '#/components/schemas/PrivateChatKeyView'

    EncryptedPrivateMessagePayload:
      type: object
      required:
        - protocolVersion
        - encryptionAlgorithm
        - keyWrapAlgorithm
        - ciphertext
        - nonce
        - senderKeyId
        - senderMessageKeyEnvelope
        - recipientKeyId
        - recipientMessageKeyEnvelope
      properties:
        protocolVersion:
          type: string
          example: v1
        encryptionAlgorithm:
          type: string
          example: AES-GCM
        keyWrapAlgorithm:
          type: string
          example: RSA-OAEP
        ciphertext:
          type: string
          example: base64-ciphertext
        nonce:
          type: string
          example: base64-nonce
        senderKeyId:
          type: string
          example: alice-browser-key
        senderMessageKeyEnvelope:
          type: string
          description: Wrapped symmetric message key for the sender's own browser key
          example: base64-sender-envelope
        recipientKeyId:
          type: string
          example: bob-browser-key
        recipientMessageKeyEnvelope:
          type: string
          description: Wrapped symmetric message key for the recipient browser key
          example: base64-recipient-envelope

    MessageRecord:
      type: object
      required:
        - messageId
        - chatId
        - senderUserId
        - text
        - timestamp
      properties:
        messageId:
          type: integer
          format: int64
          example: 987
        chatId:
          type: integer
          format: int64
          example: 123
        senderUserId:
          type: string
          example: alice@example.com
        text:
          type: string
          example: hello there
        timestamp:
          type: string
          description: Server-side message timestamp
          example: '2026-04-10T12:34:56Z'

    MessageDeleteEvent:
      type: object
      required:
        - type
        - chatId
        - messageId
      properties:
        type:
          type: string
          example: MESSAGE_DELETE
        chatId:
          type: integer
          format: int64
          example: 123
        messageId:
          type: integer
          format: int64
          example: 987

    PrivateMessageView:
      type: object
      required:
        - chatId
        - senderUsername
        - chatType
        - encryptedMessage
        - timestamp
      properties:
        chatId:
          type: integer
          format: int64
          example: 456
        senderUsername:
          type: string
          example: alice@example.com
        chatType:
          $ref: '#/components/schemas/ChatType'
        encryptedMessage:
          $ref: '#/components/schemas/EncryptedPrivateMessagePayload'
        timestamp:
          type: string
          example: '2026-04-20T12:00:00Z'

    User:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          example: bob@example.com
        firstName:
          type: string
          example: Bob
        lastName:
          type: string
          example: Example
        lastPingTime:
          type: string
          example: '2026-04-10T12:34:56'

    UserProfile:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
          example: 5d4c7d37-1712-4fc8-90f2-34b18ff1d07a
        username:
          type: string
          example: alice@example.com
        firstName:
          type: string
          nullable: true
          example: Alice
        lastName:
          type: string
          nullable: true
          example: Example
        profileUrl:
          type: string
          nullable: true
          format: uri
          example: https://lh3.googleusercontent.com/a/example
        provider:
          type: string
          nullable: true
          example: google

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid or expired bearer token
